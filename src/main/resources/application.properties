spring.application.name=json-auth-profile-service
server.port=8081

spring.config.import=optional:file:.env
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/json_auth}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyForJSONAppThatShouldBeAtLeast256BitsLong!}
jwt.expiration=86400000