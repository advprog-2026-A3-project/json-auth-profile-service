<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auth Frontend Sederhana</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 2rem auto; }
        div { margin-bottom: 1rem; }
        input, button { padding: 0.5rem; width: 100%; }
        #result { margin-top: 1rem; padding: 1rem; background: #eee; white-space: pre-wrap; }
    </style>
</head>
<body>
<h2>Test Microservice Auth</h2>

<div>
    <input type="text" id="username" placeholder="Username">
</div>
<div>
    <input type="password" id="password" placeholder="Password">
</div>
<div>
    <input type="text" id="fullName" placeholder="Full Name (Khusus Register)">
</div>

<button onclick="register()">1. Register</button>
<br><br>
<button onclick="login()">2. Login</button>

<div id="result">Hasil akan muncul di sini...</div>

<script>
    const baseUrl = 'http://localhost:8080/api/auth';

    async function register() {
        const payload = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            fullName: document.getElementById('fullName').value
        };

        const response = await fetch(`${baseUrl}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const text = await response.text();
        document.getElementById('result').innerText = text;
    }

    async function login() {
        const payload = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        const response = await fetch(`${baseUrl}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const text = await response.text();
        document.getElementById('result').innerText = text;
    }
</script>
</body>
</html>
